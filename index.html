<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raja's Shop - Home</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="Responsive.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<header>

    <div class="logo">
        <h2>Raja's Shop</h2>
    </div>

    <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="cart.html">Cart <span id="cart-count">0</span></a>
        <a href="contact.html">Contact</a>
    </nav>

    <button id="themeBtn">
        <i class="fa-solid fa-moon"></i>
    </button>

</header>

<section class="hero">

    <div class="hero-text">
        <h1>Welcome to My Shop</h1>

        <p>
            Buy quality products at the best prices.
        </p>

        <a href="products.html" class="btn">
            Shop Now
        </a>
    </div>

    <div class="hero-image">
        <img
        src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=700"
        alt="Shopping"
        loading="lazy">
    </div>

</section>

<section class="features">

<div class="card">
<i class="fa-solid fa-truck-fast"></i>
<h3>Fast Delivery</h3>
<p>Quick delivery across India.</p>
</div>

<div class="card">
<i class="fa-solid fa-shield-halved"></i>
<h3>Secure Payment</h3>
<p>100% secure checkout.</p>
</div>

<div class="card">
<i class="fa-solid fa-headset"></i>
<h3>24/7 Support</h3>
<p>Always ready to help.</p>
</div>

</section>

<footer>

<p>
© 2026 Raja's Shop. All Rights Reserved.
</p>

</footer>

<script src="app.js"></script>

</body>
</html>
